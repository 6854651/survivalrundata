[theme]
primaryColor = "#FF4757"      # Red buttons
secondaryColor = "#3742FA"    # Blue accents  
backgroundColor = "#F8F9FA"   # Light gray bg
textColor = "#2F3542"         # Dark text
font = "sans serif"

[client]
showErrorDetails = true

[server]
enableStaticServing = true
port = 8502  # Custom port

[browser]
gatherUsageStats = false